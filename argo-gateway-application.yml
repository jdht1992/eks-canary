apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canary-gateway-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: "https://github.com/jdht1992/eks-canary.git"
    targetRevision: HEAD
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: ns-canary
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
